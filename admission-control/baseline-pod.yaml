apiVersion: v1
kind: Pod
metadata:
  name: baseline-pod
  labels:
    app: baseline-test
spec:
  securityContext:
    runAsNonRoot: true

  containers:
  - name: baseline-container
    image: nginx:1.25

    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true

      capabilities:
        drop:
          - ALL

      seccompProfile:
        type: RuntimeDefault

    ports:
    - containerPort: 8080

    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
